<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>Pose Dance Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar__title">
          <h1>Pose Dance Test</h1>
        </div>

        <div class="topbar__status">
          <span class="small"
            >Easy：<span id="similarityEasyText">—</span></span
          >
          <span class="small"
            >Hard：<span id="similarityHardText">—</span></span
          >
          <span class="small">追蹤：<span id="trackingText">—</span></span>
          <span class="small">示範：<span id="demoNameText">—</span></span>
        </div>

        <div class="topbar__controls">
          <div class="topbar__controls-group topbar__controls-group--left">
            <input
              id="videoUrlInput"
              class="topbar__url-input"
              type="text"
              placeholder="貼上 YouTube 網址"
            />
          </div>
          <div class="topbar__controls-group topbar__controls-group--right">
            <button id="loadVideoButton" class="btn btn-load" type="button">
              載入影片
            </button>
            <button id="startCameraButton" class="btn btn-camera" type="button">
              啟動攝影機
            </button>
          </div>
        </div>
      </header>

      <main class="main">
        <section
          class="main__stage main__stage--demo"
          aria-label="Easy 示範骨架回放"
        >
          <canvas id="demo_canvas_easy"></canvas>
        </section>

        <section class="main__stage main__stage--user" aria-label="使用者骨架">
          <div class="camera-wrapper camera-wrapper--full">
            <video id="input_video" playsinline></video>
            <canvas id="output_canvas"></canvas>
          </div>
          <div class="hud small" id="poseInfoText">尚未開始偵測</div>
        </section>

        <section
          class="main__stage main__stage--demo"
          aria-label="Hard 示範骨架回放"
        >
          <canvas id="demo_canvas_hard"></canvas>
        </section>
      </main>

      <!-- 右下角：可拖曳/縮放的 YouTube 小視窗 -->
      <div id="ytPlayerWrapper" class="yt-wrapper" aria-label="YouTube 播放器">
        <div class="yt-wrapper__drag-handle" id="ytDragHandle">
          <span class="small">YouTube</span>
        </div>
        <div id="player" class="yt-wrapper__player"></div>
        <div class="yt-wrapper__resize-handle" id="ytResizeHandle"></div>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@mediapipe/tasks-vision": "https://esm.sh/@mediapipe/tasks-vision"
        }
      }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="./posedanceTest.js"></script>
  </body>
</html>
