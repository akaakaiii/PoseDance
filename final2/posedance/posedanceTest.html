<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>Pose Dance Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./main.css" />
    <link rel="stylesheet" href="./posedanceTest.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar__title">
          <h1>Pose Dance Test</h1>
        </div>

        <div class="topbar__status">
          <span class="small">
            Easy（即時/整體）：<span id="similarityEasyText">—</span> /
            <span id="overallEasyText">—</span>
          </span>
          <span class="small">
            Hard（即時/整體）：<span id="similarityHardText">—</span> /
            <span id="overallHardText">—</span>
          </span>
          <span class="small">
            Loaded（即時/整體）：<span id="similarityLoadedText">—</span> /
            <span id="overallLoadedText">—</span>
          </span>
        </div>

        <div class="topbar__controls">
          <div class="topbar__controls-group topbar__controls-group--left">
            <input
              id="videoUrlInput"
              class="topbar__url-input topbar__url-input--compact"
              type="text"
              placeholder="貼上 YouTube 網址"
            />
            <button id="loadVideoButton" class="btn btn-load" type="button">
              載入影片
            </button>
            <button id="pickSongButton" class="btn btn-load" type="button">
              挑選音樂
            </button>
            <button id="loadSkeletonButton" class="btn btn-load" type="button">
              載入骨架
            </button>
            <input
              id="skeletonFileInput"
              class="topbar__file-input"
              type="file"
              accept="application/json,.json"
              style="display: none"
            />
          </div>
          <div class="topbar__controls-group topbar__controls-group--right">
            <select id="hintModeSelect" class="topbar__mode-select">
              <option value="easy" selected>Easy</option>
              <option value="hard">Hard</option>
              <option value="user">使用者</option>
            </select>
            <button id="startCameraButton" class="btn btn-camera" type="button">
              啟動攝影機
            </button>
            <button id="recordButton" class="btn btn-record" type="button" disabled>
              開始錄製
            </button>
          </div>
        </div>
      </header>

      <div class="modal-backdrop" id="songModalBackdrop" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-label="挑選音樂">
          <div class="modal__header">
            <div class="modal__title">挑選音樂</div>
            <button class="modal__close" id="songModalCloseButton" type="button">
              關閉
            </button>
          </div>
          <div class="modal__body">
            <aside class="modal__sidebar">
              <div class="modal__section-title">分類</div>
              <div class="modal__categories" id="songCategories"></div>
            </aside>
            <section class="modal__content">
              <div class="modal__search">
                <input
                  id="songSearchInput"
                  class="topbar__url-input"
                  type="text"
                  placeholder="搜尋歌名/作曲者（q）"
                />
                <button id="songSearchButton" class="btn btn-load" type="button">
                  搜尋
                </button>
              </div>
              <div class="modal__list" id="songList"></div>
              <div class="modal__footer">
                <button id="songPrevPageButton" class="btn btn-load" type="button">
                  上一頁
                </button>
                <div class="small" id="songPageText">—</div>
                <button id="songNextPageButton" class="btn btn-load" type="button">
                  下一頁
                </button>
              </div>
            </section>
          </div>
        </div>
      </div>

      <main class="main">
        <section class="main__stage main__stage--user" aria-label="使用者骨架">
          <div class="camera-wrapper camera-wrapper--full">
            <video id="input_video" playsinline></video>
            <canvas id="output_canvas"></canvas>
            <canvas id="overlay_canvas"></canvas>
          </div>
          <div class="hud small" id="poseInfoText">尚未開始偵測</div>
        </section>
      </main>

      <!-- 右下角：可拖曳/縮放的 YouTube 小視窗 -->
      <div id="ytPlayerWrapper" class="yt-wrapper" aria-label="YouTube 播放器">
        <div class="yt-wrapper__drag-handle" id="ytDragHandle">
          <span class="small">YouTube</span>
        </div>
        <div id="player" class="yt-wrapper__player"></div>
        <div class="yt-wrapper__resize-handle" id="ytResizeHandle"></div>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@mediapipe/tasks-vision": "https://esm.sh/@mediapipe/tasks-vision"
        }
      }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="./posedanceTest.js"></script>
  </body>
</html>
